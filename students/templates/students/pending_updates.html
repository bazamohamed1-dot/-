{% extends 'base.html' %}
{% load static %}

{% block title %}مراجعة التحديثات المعلقة{% endblock %}
{% block header_title %}مراجعة التحديثات المعلقة{% endblock %}

{% block content %}
<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h3><i class="fas fa-tasks"></i> طلبات بانتظار الموافقة</h3>
        <div style="gap: 10px; display: flex;">
            <button class="btn btn-success" onclick="approveAll()"><i class="fas fa-check-double"></i> قبول الكل</button>
            <button class="btn btn-danger" onclick="rejectAll()"><i class="fas fa-trash"></i> رفض الكل</button>
        </div>
    </div>

    <div id="updatesList">
        <!-- Populated via JS -->
        <p style="text-align:center; color:#64748b; padding:20px;">جاري التحميل...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', loadUpdates);

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

async function loadUpdates() {
    try {
        const res = await fetch('/canteen/api/pending_updates/?_t=' + Date.now(), { cache: 'no-store' });
        const data = await res.json();

        // Handle pagination or list
        const updates = Array.isArray(data) ? data : (data.results || []);

        const container = document.getElementById('updatesList');
        if(updates.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:30px; color:#94a3b8;"><i class="fas fa-check-circle fa-3x" style="margin-bottom:10px;"></i><br>لا توجد تحديثات معلقة</div>';
            return;
        }

        container.innerHTML = `
        <table style="width:100%; border-collapse: collapse;">
            <thead>
                <tr style="background:#f8fafc; color:#64748b;">
                    <th style="padding:10px; text-align:right;">المستخدم</th>
                    <th style="padding:10px; text-align:right;">النوع</th>
                    <th style="padding:10px; text-align:right;">الإجراء</th>
                    <th style="padding:10px; text-align:right;">التفاصيل</th>
                    <th style="padding:10px; text-align:right;">التوقيت</th>
                    <th style="padding:10px; text-align:center;">قرار</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>`;
        const tbody = container.querySelector('tbody');

        updates.forEach(u => {
            let desc = '';
            let content = '';

            // Parse data payload safely
            let payload = u.data;
            if (typeof payload === 'string') {
                try { payload = JSON.parse(payload); } catch(e){}
            }
            if (typeof payload !== 'object' || payload === null) payload = {};

            if (u.model_name === 'Student') {
                // Ensure we have name details. For update/delete, it might be partial.
                // But for display, we want to show who is being affected.
                // If it's an update, payload usually has 'id' and changed fields.
                // We might rely on the original fetch or just show what's available.
                // Ideally, 'pending_update.data' should contain snapshot info or we rely on 'name' field if we stored it.
                // Let's use what we have.
                const name = `${payload.last_name || ''} ${payload.first_name || ''}`.trim() || (payload.name || 'غير محدد');
                const studentClass = payload.class_name || payload.academic_year || '';

                let detailText = `<strong>${name}</strong>`;
                if(studentClass) detailText += ` (${studentClass})`;

                if (u.action === 'create') desc = `إضافة تلميذ جديد: ${detailText}`;
                else if (u.action === 'update') desc = `تعديل بيانات تلميذ: ${detailText}`;
                else if (u.action === 'delete') desc = `حذف تلميذ: ${detailText}`;

                // Show changed fields for update
                if(u.action === 'update') {
                    const changedKeys = Object.keys(payload).filter(k => k!=='id' && k!=='photo' && k!=='photo_path' && k!=='name');
                    if (changedKeys.length > 0) {
                        content += `<div style="font-size:0.85rem; color:#475569; margin-top:5px; background:#f1f5f9; padding:5px; border-radius:4px;">
                            تعديلات على: <strong>${changedKeys.join(', ')}</strong>
                        </div>`;
                    }
                }

                // Show photo
                const photo = payload.photo || payload.photo_path;
                if (photo && photo.startsWith('data:image')) {
                    content += `<div style="margin-top:5px;"><img src="${photo}" style="height:50px; border-radius:4px; border:1px solid #ddd;"></div>`;
                } else if (u.action === 'create' && photo) {
                     content += `<div style="margin-top:5px;"><img src="${photo}" style="height:50px; border-radius:4px; border:1px solid #ddd;"></div>`;
                }

            } else if (u.model_name === 'CanteenAttendance') {
                desc = `تسجيل حضور مطعم (${u.action}): ${payload.student_id || payload.barcode || 'Unknown'}`;
            } else {
                desc = `${u.model_name} - ${u.action}`;
            }

            const tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid #e2e8f0';

            tr.innerHTML = `
                <td style="padding:10px;">${u.username || 'مستخدم'}</td>
                <td style="padding:10px;">${u.model_name}</td>
                <td style="padding:10px;">
                    ${u.action === 'create' ? '<span style="color:green; font-weight:bold;">إضافة</span>' : ''}
                    ${u.action === 'update' ? '<span style="color:orange; font-weight:bold;">تعديل</span>' : ''}
                    ${u.action === 'delete' ? '<span style="color:red; font-weight:bold;">حذف</span>' : ''}
                </td>
                <td style="padding:10px;">
                    <div>${desc}</div>
                    ${content}
                </td>
                <td style="padding:10px; direction:ltr;">${new Date(u.timestamp).toLocaleString()}</td>
                <td style="padding:10px; text-align:center;">
                    <button class="btn btn-success" onclick="approve(${u.id})" style="padding:5px 10px;"><i class="fas fa-check"></i></button>
                    <button class="btn btn-danger" onclick="reject(${u.id})" style="padding:5px 10px;"><i class="fas fa-times"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });

    } catch(e) {
        console.error(e);
        document.getElementById('updatesList').innerHTML = '<p style="color:red; text-align:center;">خطأ في تحميل البيانات</p>';
    }
}

async function approve(id) {
    try {
        const res = await fetch(`/canteen/api/pending_updates/${id}/approve/`, {
            method: 'POST',
            headers: {'X-CSRFToken': getCookie('baza_school_csrf_v2')}
        });
        if(res.ok) {
            loadUpdates();
            updateBadge();
        } else {
             const err = await res.json();
             alert("خطأ: " + (err.error || JSON.stringify(err)));
        }
    } catch(e) { alert("خطأ في الاتصال"); }
}

async function reject(id) {
    if(!confirm("هل أنت متأكد من الرفض؟")) return;
    try {
        const res = await fetch(`/canteen/api/pending_updates/${id}/reject_all/`, { // Note: using reject_all logic for single item delete isn't right, use DELETE method on detail
            method: 'DELETE', // Assuming standard delete endpoint
            headers: {'X-CSRFToken': getCookie('baza_school_csrf_v2')}
        });
        // Actually the endpoint for reject is not explicitly defined as 'reject', usually DELETE on detail is enough or a specific action.
        // Let's use standard DELETE on the resource.
        const res2 = await fetch(`/canteen/api/pending_updates/${id}/`, {
             method: 'DELETE',
             headers: {'X-CSRFToken': getCookie('baza_school_csrf_v2')}
        });

        if(res2.ok) {
            loadUpdates();
            updateBadge();
        }
    } catch(e) { alert("خطأ"); }
}

async function approveAll() {
    if(!confirm("قبول جميع التحديثات؟")) return;
    try {
        const res = await fetch(`/canteen/api/pending_updates/approve_all/`, {
            method: 'POST',
            headers: {'X-CSRFToken': getCookie('baza_school_csrf_v2')}
        });
        if(res.ok) {
            loadUpdates();
            updateBadge();
        }
    } catch(e) { alert("خطأ"); }
}

async function rejectAll() {
    if(!confirm("رفض جميع التحديثات؟ لا يمكن التراجع.")) return;
    try {
        const res = await fetch(`/canteen/api/pending_updates/reject_all/`, {
            method: 'POST',
            headers: {'X-CSRFToken': getCookie('baza_school_csrf_v2')}
        });
        if(res.ok) {
            loadUpdates();
            updateBadge();
        }
    } catch(e) { alert("خطأ"); }
}

function updateBadge() {
    try {
        fetch('/canteen/api/pending_updates/count/?_t=' + Date.now(), { cache: 'no-store' })
        .then(r=>r.json())
        .then(d => {
            // Update local badge if exists (in settings page)
            const b = document.getElementById('settingsBadge');
            if(b) b.innerText = d.count;

            // Update Sidebar Badge (navUpdateBadge)
            const navBadge = document.getElementById('navUpdateBadge');
            if (navBadge) {
                navBadge.innerText = d.count;
                navBadge.style.display = d.count > 0 ? 'inline-block' : 'none';
            }
        });
    } catch(e){}
}
</script>
{% endblock %}
